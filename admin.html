<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OptimizaFlow — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#060b14;font-family:'Sora',sans-serif;color:#e2e8f0}
.header{border-bottom:1px solid #0f172a;padding:0 28px;background:#080e19;position:sticky;top:0;z-index:100}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#ef4444,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-title{font-size:16px;font-weight:800;background:linear-gradient(90deg,#ef4444,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;color:#ef444450;letter-spacing:.08em;margin-top:-2px}
.nav-tabs{display:flex;background:#0f172a;border-radius:8px;border:1px solid #1e293b;overflow:hidden}
.nav-tab{padding:7px 18px;border:none;cursor:pointer;font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;font-family:inherit;transition:all .2s;background:transparent;color:#475569;position:relative}
.nav-tab.active{background:linear-gradient(135deg,#ef4444,#f59e0b);color:white}
.nav-tab .badge{position:absolute;top:4px;right:4px;background:#ef4444;color:white;border-radius:10px;
  padding:1px 5px;font-size:9px;font-weight:800;display:none}
.stats-bar{border-bottom:1px solid #0a1020;padding:0 28px;background:#080e19}
.stats-inner{max-width:1300px;margin:0 auto;display:flex;gap:28px;padding:12px 0;flex-wrap:wrap;align-items:center}
.filter-bar{padding:13px 28px;border-bottom:1px solid #0a1020}
.filter-inner{max-width:1300px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:24px 28px;max-width:1300px;margin:0 auto}
.lista{padding:24px 28px;max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.lista-header{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 130px;gap:16px;padding:10px 18px;
  font-size:11px;font-weight:700;color:#1e293b;letter-spacing:.1em;text-transform:uppercase}
.lista-row{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 130px;gap:16px;padding:13px 18px;
  background:#0d1117;border:1px solid #1e293b;border-radius:10px;align-items:center;transition:background .15s}
.lista-row:hover{background:#0f172a}
.card{background:#0d1117;border:1px solid #1e293b;border-radius:10px;padding:16px 18px;transition:all .18s}
.badge-prioridad{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.badge-estado{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:4px}
.btn-gestionar{background:linear-gradient(135deg,#ef4444,#f59e0b);border:none;border-radius:6px;
  color:white;cursor:pointer;padding:5px 12px;font-size:11px;font-weight:700;font-family:inherit}
.btn-del{background:none;border:1px solid #1e293b;border-radius:6px;color:#475569;cursor:pointer;
  padding:5px 8px;font-size:11px;transition:all .15s}
.btn-del:hover{color:#ef4444;border-color:#ef4444}
.btn-view{display:flex;background:#0f172a;border-radius:8px;border:1px solid #1e293b;overflow:hidden}
.btn-view button{padding:7px 16px;border:none;cursor:pointer;font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;font-family:inherit;transition:all .2s}
label.lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748b;margin-bottom:6px;display:block}
.inp{width:100%;background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:10px 14px;
  color:#e2e8f0;font-size:14px;outline:none;font-family:inherit}
.inp:focus{border-color:#6366f1}
textarea.inp{min-height:80px;resize:vertical}
select.inp-sm{background:#0d1117;border:1px solid #1e293b;border-radius:8px;padding:7px 12px;
  color:#94a3b8;font-size:12px;cursor:pointer;outline:none;font-family:inherit}
input.inp-sm{background:#0d1117;border:1px solid #1e293b;border-radius:8px;padding:7px 12px;
  color:#e2e8f0;font-size:12px;outline:none;font-family:inherit}
input.inp-sm::placeholder{color:#334155}
.stage-btn{padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;
  font-family:inherit;transition:all .15s;text-align:left;border:2px solid #1e293b;background:transparent;color:#475569}
.prio-btn{flex:1;padding:9px 0;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;
  font-family:inherit;transition:all .15s;border:2px solid #1e293b;background:transparent;color:#475569}
.comment-box{background:#080e19;border:1px solid #0f172a;border-left:3px solid #6366f1;border-radius:8px;padding:10px 14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;
  justify-content:center;z-index:1000;backdrop-filter:blur(6px);padding:20px}
.modal{background:#0d1117;border:1px solid #1e293b;border-radius:16px;width:100%;
  max-width:580px;max-height:92vh;overflow-y:auto;padding:32px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);border-radius:10px;
  padding:12px 24px;font-size:14px;font-weight:700;z-index:2000;box-shadow:0 4px 20px rgba(0,0,0,.4);display:none}
.toast.ok{background:#10b981;color:white}
.toast.err{background:#ef4444;color:white}
.empty{text-align:center;padding:64px 0;color:#1e293b}

/* Usuarios */
.users-wrap{padding:24px 28px;max-width:1300px;margin:0 auto}
.section-title{font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.user-card{background:#0d1117;border:1px solid #1e293b;border-radius:10px;padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:8px}
.user-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0}
.user-info{flex:1}
.user-name{font-size:14px;font-weight:700;color:#f1f5f9}
.user-detail{font-size:12px;color:#475569;margin-top:2px}
.user-actions{display:flex;gap:8px;align-items:center}
.btn-approve{padding:7px 16px;border-radius:7px;border:none;background:linear-gradient(135deg,#10b981,#059669);
  color:white;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.btn-reject{padding:7px 16px;border-radius:7px;border:1px solid #ef4444;background:transparent;
  color:#ef4444;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.btn-sector{padding:7px 16px;border-radius:7px;border:1px solid #6366f1;background:transparent;
  color:#6366f1;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.status-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo-icon">🔧</div>
      <div><div class="logo-title">OptimizaFlow</div><div class="logo-sub">PANEL ADMINISTRADOR</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="saveIndicator" style="font-size:11px;display:none"></span>
      <div class="nav-tabs">
        <button class="nav-tab active" id="tabSolicitudes" onclick="setSection('solicitudes')">Solicitudes</button>
        <button class="nav-tab" id="tabUsuarios" onclick="setSection('usuarios')">
          Usuarios<span class="badge" id="pendingBadge"></span>
        </button>
      </div>
      <div class="btn-view" id="vistaToggle">
        <button id="btnKanban" onclick="setVista(true)"  style="background:linear-gradient(135deg,#ef4444,#f59e0b);color:white">Tablero</button>
        <button id="btnLista"  onclick="setVista(false)" style="background:transparent;color:#475569">Lista</button>
      </div>
      <button onclick="loadData()" style="background:none;border:1px solid #1e293b;border-radius:8px;color:#334155;cursor:pointer;padding:7px 14px;font-size:12px;font-family:inherit">↻</button>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-inner" id="statsBar"><span style="color:#334155;font-size:13px">Cargando…</span></div>
</div>

<!-- SOLICITUDES -->
<div id="sectionSolicitudes">
  <div class="filter-bar">
    <div class="filter-inner">
      <input id="busqueda" class="inp-sm" placeholder="🔍  Buscar…" style="width:220px" oninput="renderContent()"/>
      <select id="filtroEstado" class="inp-sm" onchange="renderContent()">
        <option value="todos">Todos los estados</option>
        <option value="pendiente">Pendiente</option>
        <option value="desarrollo">En Desarrollo</option>
        <option value="prueba">En Prueba</option>
        <option value="produccion">En Producción</option>
        <option value="rechazado">Rechazado</option>
      </select>
      <select id="filtroPrio" class="inp-sm" onchange="renderContent()">
        <option value="todas">Todas las prioridades</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
      <select id="filtroEquipo" class="inp-sm" onchange="renderContent()">
        <option value="todos">Todos los equipos</option>
        <option>Almacenes y Logística</option>
        <option>Gestión de Materiales</option>
        <option>Logística y Transporte</option>
        <option>Venta de Materiales</option>
      </select>
      <button onclick="limpiarFiltros()" style="background:none;border:1px solid #1e293b;border-radius:8px;padding:7px 12px;color:#475569;cursor:pointer;font-size:12px;font-family:inherit">Limpiar ✕</button>
      <span id="countLabel" style="margin-left:auto;font-size:12px;color:#334155"></span>
    </div>
  </div>
  <div id="mainContent"></div>
</div>

<!-- USUARIOS -->
<div id="sectionUsuarios" style="display:none">
  <div class="users-wrap">
    <!-- Pendientes -->
    <div id="pendingUsersWrap">
      <div class="section-title">
        <span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;box-shadow:0 0 8px #f59e0b;display:inline-block"></span>
        Pendientes de aprobación <span id="pendingCount" style="background:#f59e0b20;color:#f59e0b;border-radius:20px;padding:2px 10px;font-size:12px"></span>
      </div>
      <div id="pendingUsersList"></div>
    </div>
    <!-- Aprobados -->
    <div style="margin-top:28px">
      <div class="section-title">
        <span style="width:10px;height:10px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981;display:inline-block"></span>
        Usuarios aprobados <span id="approvedCount" style="background:#10b98120;color:#10b981;border-radius:20px;padding:2px 10px;font-size:12px"></span>
      </div>
      <div id="approvedUsersList"></div>
    </div>
    <!-- Rechazados -->
    <div style="margin-top:28px" id="rejectedWrap">
      <div class="section-title">
        <span style="width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block"></span>
        Rechazados
      </div>
      <div id="rejectedUsersList"></div>
    </div>
  </div>
</div>

<!-- Modal gestión solicitud -->
<div class="overlay" id="adminOverlay" style="display:none">
  <div class="modal" id="adminModal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API="https://script.google.com/macros/s/AKfycby6xK8H6ESoruYOfevHRb7gux4fRbbm1AMsP8PzDKD_mQdiPYLfjEPJ4UIP86f2-hN3/exec";
const STAGES=[
  {id:"pendiente", label:"Pendiente",     color:"#94a3b8",bg:"rgba(148,163,184,0.10)"},
  {id:"desarrollo",label:"En Desarrollo", color:"#f59e0b",bg:"rgba(245,158,11,0.10)"},
  {id:"prueba",    label:"En Prueba",      color:"#6366f1",bg:"rgba(99,102,241,0.10)"},
  {id:"produccion",label:"En Producción", color:"#10b981",bg:"rgba(16,185,129,0.10)"},
  {id:"rechazado", label:"Rechazado",      color:"#ef4444",bg:"rgba(239,68,68,0.10)"},
];
const PRIOS=[{id:"alta",label:"Alta",color:"#ef4444"},{id:"media",label:"Media",color:"#f59e0b"},{id:"baja",label:"Baja",color:"#10b981"}];
let allData={solicitudes:[],usuarios:[],nextId:1};
let vistaKanban=true, currentSection="solicitudes", modalSol=null, modalEstado="", modalPrio="";
const gradAdmin="linear-gradient(135deg,#ef4444,#f59e0b)";

function jsonpGet(extra=""){
  return new Promise((res,rej)=>{
    const cb="cb_"+Date.now(),sc=document.createElement("script");
    window[cb]=d=>{delete window[cb];sc.remove();res(d);};
    sc.src=API+"?callback="+cb+extra+"&t="+Date.now();
    sc.onerror=()=>{delete window[cb];sc.remove();rej(new Error("net"));};
    document.head.appendChild(sc);
  });
}
function jsonpSave(d){
  const sinArchivos={
    ...d,
    solicitudes:(d.solicitudes||[]).map(s=>({...s,adjuntos:[]}))
  };
  return jsonpGet("&action=save&data="+encodeURIComponent(JSON.stringify(sinArchivos)));
}

async function saveData(){
  const ind=document.getElementById("saveIndicator");
  ind.textContent="⏳ Guardando…";ind.style.color="#f59e0b";ind.style.display="inline";
  try{
    await jsonpSave(allData);
    ind.textContent="✓ Guardado";ind.style.color="#10b981";
    setTimeout(()=>ind.style.display="none",2000);
  }catch{ind.textContent="⚠️ Error";ind.style.color="#ef4444";}
}

function loadData(){
  return new Promise(res=>{
    const cb="cb_"+Date.now(),sc=document.createElement("script");
    window[cb]=d=>{
      if(d&&d.nextId!==undefined)allData=d;
      delete window[cb];sc.remove();
      renderStats();
      if(currentSection==="solicitudes")renderContent();
      else renderUsers();
      updatePendingBadge();
      res();
    };
    sc.src=API+"?callback="+cb+"&t="+Date.now();
    sc.onerror=()=>{delete window[cb];sc.remove();renderStats();res();};
    document.head.appendChild(sc);
  });
}

function updatePendingBadge(){
  const n=(allData.usuarios||[]).filter(u=>u.estado==="pendiente").length;
  const b=document.getElementById("pendingBadge");
  b.textContent=n;b.style.display=n>0?"inline":"none";
}

function setSection(s){
  currentSection=s;
  document.getElementById("sectionSolicitudes").style.display=s==="solicitudes"?"block":"none";
  document.getElementById("sectionUsuarios").style.display=s==="usuarios"?"block":"none";
  document.getElementById("vistaToggle").style.display=s==="solicitudes"?"flex":"none";
  document.getElementById("tabSolicitudes").className="nav-tab"+(s==="solicitudes"?" active":"");
  document.getElementById("tabUsuarios").className="nav-tab"+(s==="usuarios"?" active":"");
  if(s==="usuarios")renderUsers();
}

// ── USUARIOS ─────────────────────────────────────────────────────────────────
function renderUsers(){
  const usuarios=allData.usuarios||[];
  const pendientes=usuarios.filter(u=>u.estado==="pendiente");
  const aprobados =usuarios.filter(u=>u.estado==="aprobado");
  const rechazados=usuarios.filter(u=>u.estado==="rechazado");
  document.getElementById("pendingCount").textContent=pendientes.length;
  document.getElementById("approvedCount").textContent=aprobados.length;
  document.getElementById("pendingUsersList").innerHTML=pendientes.length===0
    ?`<div style="padding:20px;text-align:center;color:#1e293b;font-size:13px;border:1px dashed #0f172a;border-radius:10px">Sin solicitudes pendientes</div>`
    :pendientes.map(u=>userCardHTML(u,"pendiente")).join("");
  document.getElementById("approvedUsersList").innerHTML=aprobados.length===0
    ?`<div style="padding:20px;text-align:center;color:#1e293b;font-size:13px;border:1px dashed #0f172a;border-radius:10px">Sin usuarios aprobados aún</div>`
    :aprobados.map(u=>userCardHTML(u,"aprobado")).join("");
  document.getElementById("rejectedUsersList").innerHTML=rechazados.length===0
    ?`<div style="padding:20px;text-align:center;color:#1e293b;font-size:13px">Sin rechazados</div>`
    :rechazados.map(u=>userCardHTML(u,"rechazado")).join("");
  document.getElementById("rejectedWrap").style.display=rechazados.length?"block":"none";
}

function userCardHTML(u,estado){
  const initials=u.nombre.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const colors={pendiente:"#f59e0b",aprobado:"#10b981",rechazado:"#ef4444"};
  const fecha=new Date(u.fechaRegistro).toLocaleDateString("es-AR",{day:"2-digit",month:"short",year:"numeric"});
  let actions="";
  if(estado==="pendiente"){
    actions=`<button class="btn-approve" onclick="cambiarEstadoUser('${u.id}','aprobado')">✓ Aprobar</button>
             <button class="btn-reject"  onclick="cambiarEstadoUser('${u.id}','rechazado')">✕ Rechazar</button>`;
  } else if(estado==="aprobado"){
    actions=`<button class="btn-sector" onclick="abrirCambiarSector('${u.id}')">✎ Sector</button>
             <button class="btn-reject" onclick="cambiarEstadoUser('${u.id}','rechazado')">Revocar acceso</button>`;
  } else {
    actions=`<button class="btn-approve" onclick="cambiarEstadoUser('${u.id}','aprobado')">Aprobar</button>`;
  }
  return `<div class="user-card">
    <div class="user-avatar" style="background:${colors[estado]}22;color:${colors[estado]};border:1px solid ${colors[estado]}40">${initials}</div>
    <div class="user-info">
      <div class="user-name">${u.nombre}</div>
      <div class="user-detail">${u.email} · ${u.equipo} · Registro: ${fecha}</div>
    </div>
    <div class="user-actions">${actions}</div>
  </div>`;
}

async function cambiarEstadoUser(uid,nuevoEstado){
  allData.usuarios=(allData.usuarios||[]).map(u=>u.id===uid?{...u,estado:nuevoEstado}:u);
  renderUsers();updatePendingBadge();
  await saveData();
  const msg={aprobado:"✓ Usuario aprobado",rechazado:"Usuario rechazado"}[nuevoEstado]||"Actualizado";
  showToast(msg,nuevoEstado==="aprobado"?"ok":"err");
}

// ── SOLICITUDES ──────────────────────────────────────────────────────────────
function badgePrio(id){
  const p=PRIOS.find(x=>x.id===id)||PRIOS[1];
  return `<span class="badge-prioridad" style="border:1px solid ${p.color}35;color:${p.color};background:${p.color}12"><span style="width:6px;height:6px;border-radius:50%;background:${p.color};display:inline-block"></span>${p.label}</span>`;
}
function badgeEstado(id){
  const s=STAGES.find(x=>x.id===id)||STAGES[0];
  return `<span class="badge-estado" style="color:${s.color};background:${s.bg};border:1px solid ${s.color}30">${s.label}</span>`;
}

function renderStats(){
  const sol=allData.solicitudes||[];
  document.getElementById("statsBar").innerHTML=STAGES.map(s=>{
    const c=sol.filter(x=>x.estado===s.id).length;
    const active=document.getElementById("filtroEstado")?.value===s.id;
    return `<div onclick="toggleFiltroEstado('${s.id}')" style="display:flex;align-items:center;gap:8px;cursor:pointer">
      <div style="width:8px;height:8px;border-radius:50%;background:${s.color};box-shadow:${active?'0 0 8px '+s.color:'none'}"></div>
      <span style="font-size:12px;color:${active?s.color:'#334155'}">${s.label}</span>
      <span style="font-size:15px;font-weight:800;color:${s.color}">${c}</span>
    </div>`;
  }).join("")+`<div style="margin-left:auto;display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:#1e293b">Total</span><span style="font-size:15px;font-weight:800;color:#f1f5f9">${sol.length}</span></div>`;
}

function toggleFiltroEstado(id){
  const sel=document.getElementById("filtroEstado");sel.value=sel.value===id?"todos":id;
  renderStats();renderContent();
}
function limpiarFiltros(){
  document.getElementById("busqueda").value="";
  document.getElementById("filtroEstado").value="todos";
  document.getElementById("filtroPrio").value="todas";
  document.getElementById("filtroEquipo").value="todos";
  renderStats();renderContent();
}
function getFiltradas(){
  const busq=document.getElementById("busqueda").value.toLowerCase();
  const est =document.getElementById("filtroEstado").value;
  const prio=document.getElementById("filtroPrio").value;
  const eq  =document.getElementById("filtroEquipo").value;
  return (allData.solicitudes||[])
    .filter(s=>est==="todos"||s.estado===est)
    .filter(s=>prio==="todas"||s.prioridad===prio)
    .filter(s=>eq==="todos"||(s.equipo||"")=== eq)
    .filter(s=>!busq||s.titulo.toLowerCase().includes(busq)||(s.solicitante||"").toLowerCase().includes(busq))
    .sort((a,b)=>new Date(b.fechaCreacion)-new Date(a.fechaCreacion));
}
function setVista(k){
  vistaKanban=k;
  const grad=gradAdmin;
  document.getElementById("btnKanban").style.background=k?grad:"transparent";
  document.getElementById("btnKanban").style.color=k?"white":"#475569";
  document.getElementById("btnLista").style.background=!k?grad:"transparent";
  document.getElementById("btnLista").style.color=!k?"white":"#475569";
  renderContent();
}
function renderContent(){
  const sol=getFiltradas();
  document.getElementById("countLabel").textContent=sol.length+" solicitud"+(sol.length!==1?"es":"");
  vistaKanban?renderKanban(sol):renderLista(sol);
}
function cardHTML(s){
  const stage=STAGES.find(x=>x.id===s.estado)||STAGES[0];
  const fecha=new Date(s.fechaCreacion).toLocaleDateString("es-AR",{day:"2-digit",month:"short",year:"numeric"});
  return `<div class="card" style="border-left:3px solid ${stage.color}"
    onmouseenter="this.style.boxShadow='0 4px 20px ${stage.color}15';this.style.borderColor='${stage.color}'"
    onmouseleave="this.style.boxShadow='none';this.style.borderColor='${stage.color}'">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div style="font-size:14px;font-weight:700;color:#f1f5f9;line-height:1.3;flex:1;padding-right:8px">${s.titulo}</div>
      ${badgePrio(s.prioridad)}</div>
    <div style="font-size:12px;color:#475569;margin-bottom:8px">${s.equipo||""} · ${s.solicitante}</div>
    ${s.descripcion?`<div style="font-size:12px;color:#64748b;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${s.descripcion}</div>`:""}
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
      ${badgeEstado(s.estado)}
      <div style="display:flex;align-items:center;gap:6px">
        ${s.comentarios?.length?`<span style="font-size:11px;color:#6366f1">💬${s.comentarios.length}</span>`:""}
        <span style="font-size:11px;color:#334155">📅${fecha}</span>
        <button class="btn-gestionar" onclick="abrirAdmin(${s.id})">Gestionar</button>
        <button class="btn-del" onclick="eliminar(${s.id})">🗑</button>
      </div></div></div>`;
}
function renderKanban(sol){
  const mc=document.getElementById("mainContent");
  mc.className="kanban";
  mc.innerHTML=STAGES.map(stage=>{
    const cols=sol.filter(s=>s.estado===stage.id);
    return `<div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:9px 14px;background:${stage.bg};border-radius:8px;border:1px solid ${stage.color}20">
        <div style="width:9px;height:9px;border-radius:50%;background:${stage.color};box-shadow:0 0 6px ${stage.color}"></div>
        <span style="font-size:12px;font-weight:700;color:${stage.color};text-transform:uppercase;letter-spacing:.08em">${stage.label}</span>
        <span style="margin-left:auto;background:${stage.color}20;color:${stage.color};border-radius:20px;padding:2px 9px;font-size:12px;font-weight:800">${cols.length}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${cols.length===0?'<div style="padding:20px;text-align:center;color:#1e293b;font-size:12px;border:1px dashed #0f172a;border-radius:10px">Sin solicitudes</div>':cols.map(s=>cardHTML(s)).join("")}
      </div></div>`;
  }).join("");
}
function renderLista(sol){
  const mc=document.getElementById("mainContent");
  mc.className="lista";
  if(!sol.length){mc.innerHTML=`<div class="empty"><div style="font-size:40px;margin-bottom:12px">📭</div><div style="font-size:14px">Sin solicitudes</div></div>`;return;}
  mc.innerHTML=`<div class="lista-header"><span>Solicitud</span><span>Equipo</span><span>Prioridad</span><span>Estado</span><span>Fecha</span><span></span></div>`+
  sol.map(s=>{
    const fecha=new Date(s.fechaCreacion).toLocaleDateString("es-AR",{day:"2-digit",month:"short"});
    return `<div class="lista-row">
      <div><div style="font-size:13px;font-weight:600;color:#f1f5f9">${s.titulo}</div><div style="font-size:11px;color:#475569;margin-top:2px">${s.solicitante}</div></div>
      <span style="font-size:12px;color:#475569">${s.equipo||"—"}</span>
      ${badgePrio(s.prioridad)}${badgeEstado(s.estado)}
      <span style="font-size:11px;color:#334155">${fecha}</span>
      <div style="display:flex;gap:6px">
        <button class="btn-gestionar" onclick="abrirAdmin(${s.id})">Gestionar</button>
        <button class="btn-del" onclick="eliminar(${s.id})">🗑</button>
      </div></div>`;
  }).join("");
}

// ── Modal admin ──────────────────────────────────────────────────────────────
async function abrirAdmin(id){
  modalSol=(allData.solicitudes||[]).find(s=>s.id===id);if(!modalSol)return;
  modalEstado=modalSol.estado;modalPrio=modalSol.prioridad;
  renderAdminModal();
  document.getElementById("adminOverlay").style.display="flex";
}
function renderAdminModal(){
  const s=modalSol;
  const fecha=new Date(s.fechaCreacion).toLocaleDateString("es-AR",{day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
  document.getElementById("adminModal").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div style="flex:1;padding-right:16px">
        <div style="font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#ef4444;margin-bottom:6px">🔧 PANEL ADMIN</div>
        <div style="font-size:18px;font-weight:700;color:#f1f5f9;line-height:1.3">${s.titulo}</div>
        <div style="font-size:12px;color:#475569;margin-top:6px">${s.equipo||""} · ${s.solicitante} · ${fecha}</div>
      </div>
      <button style="background:none;border:none;color:#475569;cursor:pointer;font-size:22px" onclick="document.getElementById('adminOverlay').style.display='none'">✕</button>
    </div>
    ${s.descripcion?`<div style="background:#080e19;border:1px solid #0f172a;border-radius:8px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:#64748b;line-height:1.6">${s.descripcion}</div>`:""}
    <div style="display:flex;flex-direction:column;gap:20px">
      <div><label class="lbl">Cambiar estado</label>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px" id="stageGrid"></div></div>
      <div><label class="lbl">Cambiar prioridad</label>
        <div style="display:flex;gap:8px" id="prioGrid"></div></div>
      <div><label class="lbl">Sector solicitante</label>
        <select id="adminEquipo" class="inp" style="cursor:pointer">
          <option value="Almacenes y Logística">Almacenes y Logística</option>
          <option value="Gestión de Materiales">Gestión de Materiales</option>
          <option value="Logística y Transporte">Logística y Transporte</option>
          <option value="Venta de Materiales">Venta de Materiales</option>
        </select></div>
      ${s.comentarios?.length?`<div><label class="lbl">Comentarios anteriores</label><div style="display:flex;flex-direction:column;gap:8px">${s.comentarios.map(c=>`<div class="comment-box"><div style="font-size:11px;color:#6366f1;font-weight:700;margin-bottom:4px">${new Date(c.fecha).toLocaleDateString("es-AR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</div><div style="font-size:13px;color:#94a3b8;line-height:1.5">${c.texto}</div></div>`).join("")}</div></div>`:""}
      <div><label class="lbl">Agregar comentario</label>
        <textarea id="nuevoComentario" class="inp" placeholder="Actualizaciones, próximos pasos…"></textarea></div>
    </div>
    <div style="display:flex;gap:12px;margin-top:28px;justify-content:flex-end">
      <button style="padding:10px 24px;border-radius:8px;border:1px solid #1e293b;background:transparent;color:#94a3b8;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit"
        onclick="document.getElementById('adminOverlay').style.display='none'">Cancelar</button>
      <button style="padding:10px 28px;border-radius:8px;border:none;background:${gradAdmin};color:white;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit"
        onclick="guardarAdmin()">Guardar cambios</button>
    </div>`;
  const sg=document.getElementById("stageGrid");
  STAGES.forEach(st=>{
    const btn=document.createElement("button");btn.className="stage-btn";
    btn.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${st.color};display:inline-block;margin-right:8px;${modalEstado===st.id?'box-shadow:0 0 6px '+st.color:''}"></span>${st.label}`;
    btn.style.border=modalEstado===st.id?`2px solid ${st.color}`:"2px solid #1e293b";
    btn.style.background=modalEstado===st.id?st.bg:"transparent";
    btn.style.color=modalEstado===st.id?st.color:"#475569";
    btn.onclick=()=>{modalEstado=st.id;renderAdminModal();};
    sg.appendChild(btn);
  });
  const pg=document.getElementById("prioGrid");
  PRIOS.forEach(p=>{
    const btn=document.createElement("button");btn.className="prio-btn";btn.textContent=p.label;
    btn.style.border=modalPrio===p.id?`2px solid ${p.color}`:"2px solid #1e293b";
    btn.style.background=modalPrio===p.id?`${p.color}18`:"transparent";
    btn.style.color=modalPrio===p.id?p.color:"#475569";
    btn.onclick=()=>{modalPrio=p.id;renderAdminModal();};
    pg.appendChild(btn);
  });
  document.getElementById("adminEquipo").value=modalSol.equipo||"Gestión de Materiales";
}
async function guardarAdmin(){
  const comentario=document.getElementById("nuevoComentario").value.trim();
  allData.solicitudes=(allData.solicitudes||[]).map(s=>{
    if(s.id!==modalSol.id)return s;
    const u={...s,estado:modalEstado,prioridad:modalPrio,equipo:document.getElementById('adminEquipo').value};
    if(comentario)u.comentarios=[...(s.comentarios||[]),{texto:comentario,fecha:new Date().toISOString()}];
    return u;
  });
  document.getElementById("adminOverlay").style.display="none";
  await saveData();renderStats();renderContent();
  showToast("✅ Cambios guardados","ok");
}
async function eliminar(id){
  if(!confirm("¿Eliminar esta solicitud?"))return;
  allData.solicitudes=(allData.solicitudes||[]).filter(s=>s.id!==id);
  await saveData();renderStats();renderContent();
  showToast("🗑 Solicitud eliminada","ok");
}
function showToast(msg,type){
  const t=document.getElementById("toast");t.textContent=msg;t.className="toast "+type;t.style.display="block";
  setTimeout(()=>t.style.display="none",3500);
}
loadData();
setInterval(loadData,20000);
</script>
<!-- Modal cambiar sector -->
<div id="sectorOverlay" class="overlay" style="display:none;align-items:center;justify-content:center">
  <div style="background:#0d1117;border:1px solid #1e293b;border-radius:16px;padding:32px;width:100%;max-width:380px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h3 style="margin:0;font-size:18px">Cambiar sector</h3>
      <button style="background:none;border:none;color:#475569;cursor:pointer;font-size:22px" onclick="cerrarSectorModal()">✕</button>
    </div>
    <div id="sectorUserName" style="color:#94a3b8;font-size:14px;margin-bottom:16px"></div>
    <label style="font-size:11px;font-weight:700;letter-spacing:.08em;color:#475569;text-transform:uppercase">Nuevo sector</label>
    <select id="sectorSelect" style="width:100%;padding:10px 14px;background:#0f172a;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-family:inherit;font-size:14px;margin-top:8px;margin-bottom:24px">
      <option value="Almacenes y Logística">Almacenes y Logística</option>
      <option value="Gestión de Materiales">Gestión de Materiales</option>
      <option value="Logística y Transporte">Logística y Transporte</option>
      <option value="Venta de Materiales">Venta de Materiales</option>
    </select>
    <div style="display:flex;gap:12px;justify-content:flex-end">
      <button class="btn-outline" style="width:auto;padding:10px 20px" onclick="cerrarSectorModal()">Cancelar</button>
      <button onclick="guardarSector()" style="padding:10px 24px;border-radius:8px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit">Guardar</button>
    </div>
  </div>
</div>
<script>
let sectorUserId=null;
function abrirCambiarSector(uid){
  const u=(allData.usuarios||[]).find(x=>x.id===uid);
  if(!u) return;
  sectorUserId=uid;
  document.getElementById("sectorUserName").textContent=u.nombre+" · "+u.email;
  document.getElementById("sectorSelect").value=u.equipo||"Gestión de Materiales";
  document.getElementById("sectorOverlay").style.display="flex";
}
function cerrarSectorModal(){
  document.getElementById("sectorOverlay").style.display="none";
  sectorUserId=null;
}
async function guardarSector(){
  if(!sectorUserId) return;
  const nuevoSector=document.getElementById("sectorSelect").value;
  allData.usuarios=(allData.usuarios||[]).map(u=>u.id===sectorUserId?{...u,equipo:nuevoSector}:u);
  renderUsers();
  await saveData();
  showToast("✓ Sector actualizado","ok");
  cerrarSectorModal();
}
</script>
